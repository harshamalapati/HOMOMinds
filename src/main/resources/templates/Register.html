<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOMOMinds | Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#fff7eb;
    font-family:'Segoe UI',sans-serif;
}

.register-box{
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.title{
    color:#4b1e1e;
    font-weight:800;
}

.btn-cultural{
    background:#4b1e1e;
    color:#f5d08a;
    border:none;
    border-radius:30px;
    padding:12px;
    font-weight:700;
}

.btn-cultural:hover{
    background:#6b2b2b;
    color:white;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="register-box">

                <h2 class="title text-center mb-4">
                    HOMOMinds Registration
                </h2>

                <form th:action="@{/user/register}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>

                        <input type="text"
                               class="form-control"
                               name="name"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>

                        <input type="email"
                               class="form-control"
                               name="email"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>

                        <input type="text"
                               class="form-control"
                               name="mobile"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Talent / Skill</label>

                        <select class="form-select"
                                name="talent">

                            <option>Dance</option>
                            <option>Music</option>
                            <option>Cooking</option>
                            <option>Poetry</option>
                            <option>Painting</option>
                            <option>Storytelling</option>
                            <option>Crafts</option>

                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>

                        <input type="password"
                               class="form-control"
                               name="password"
                               required>
                    </div>

                    <button type="submit"
                            class="btn btn-cultural w-100">

                        Create Account

                    </button>

                    <div class="text-center mt-3">

                        Already have account?

                        <a th:href="@{/login}">
                            Login
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
