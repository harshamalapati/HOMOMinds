<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#fff7eb;
    font-family:'Segoe UI',sans-serif;
}

.forgot-box{
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

.title{
    color:#4b1e1e;
    font-weight:800;
}

.btn-cultural{
    background:#4b1e1e;
    color:#f5d08a;
    border:none;
    border-radius:30px;
    padding:12px;
    font-weight:700;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-5">

            <div class="forgot-box">

                <h2 class="title text-center mb-4">
                    Forgot Password
                </h2>

                <form th:action="@{/forgot-password/send}" method="post">

                    <div class="mb-4">

                        <label class="form-label">
                            Enter Registered Email
                        </label>

                        <input type="email"
                               class="form-control"
                               name="email"
                               required>

                    </div>

                    <button type="submit"
                            class="btn btn-cultural w-100">

                        Send Reset Link

                    </button>

                    <div class="text-center mt-3">

                        <a th:href="@{/login}">
                            Back To Login
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
